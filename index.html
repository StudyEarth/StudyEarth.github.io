<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juxlyep</title>
    <style>
        /* Wikipediaの基本設計を忠実に再現 */
        :root {
            --link-color: #0645ad;
            --border-color: #a2a9b1;
            --bg-gray: #f6f6f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            font-size: 14px;
            line-height: 1.6;
            background-color: var(--bg-gray);
            display: flex;
        }

        /* 左メニュー */
        nav {
            width: 160px;
            padding: 15px;
            flex-shrink: 0;
        }

        .logo {
            font-family: serif;
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            color: #000;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            border-top: 1px solid var(--border-color);
        }

        nav li {
            padding: 5px 0;
            font-size: 12px;
        }

        nav a {
            text-decoration: none;
            color: var(--link-color);
        }

        /* メイン記事エリア */
        .main-wrapper {
            flex-grow: 1;
            background-color: white;
            border-left: 1px solid var(--border-color);
            min-height: 100vh;
            padding: 20px 40px;
        }

        h1 {
            font-family: 'Times New Roman', serif;
            font-size: 1.8rem;
            border-bottom: 1px solid var(--border-color);
            margin-top: 0;
            font-weight: normal;
        }

        .tagline {
            font-size: 12px;
            margin-bottom: 20px;
        }

        /* 右側インフォボックス */
        .infobox {
            float: right;
            width: 260px;
            border: 1px solid var(--border-color);
            background-color: #f8f9fa;
            margin-left: 20px;
            font-size: 12px;
        }

        .infobox table {
            width: 100%;
            border-collapse: collapse;
        }

        .infobox th {
            background-color: #cedff2;
            border: 1px solid var(--border-color);
            padding: 5px;
            text-align: left;
        }

        .infobox td {
            border: 1px solid var(--border-color);
            padding: 5px;
        }

        h2 {
            border-bottom: 1px solid var(--border-color);
            font-size: 1.5rem;
            font-weight: normal;
            margin-top: 30px;
        }

        .content-body {
            text-align: justify;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Juxlyep</div>
    <ul>
        <li><a href="#">メインページ</a></li>
        <li><a href="#">最近の更新</a></li>
        <li><a href="#">おまかせ表示</a></li>
    </ul>
</nav>

<div class="main-wrapper" id="app">
    <!-- JavaScriptによる動的描画エリア -->
</div>

<script>
    // 取得した記事データの流し込み用オブジェクト
    const pageData = {
        title: "記事のタイトル",
        summary: "ここに記事の導入文を入力します。",
        infobox: [
            { label: "項目1", value: "内容1" },
            { label: "項目2", value: "内容2" }
        ],
        sections: [
            { heading: "概要", text: "ここに概要の文章を入力します。" },
            { heading: "歴史", text: "ここに歴史の文章を入力します。" }
        ]
    };

    function renderPage(data) {
        const app = document.getElementById('app');
        
        let infoboxHtml = `
            <div class="infobox">
                <table>
                    <tr><th colspan="2" style="text-align:center;">基本情報</th></tr>
                    ${data.infobox.map(item => `
                        <tr><th>${item.label}</th><td>${item.value}</td></tr>
                    `).join('')}
                </table>
            </div>
        `;

        let sectionsHtml = data.sections.map(sec => `
            <h2>${sec.heading}</h2>
            <p>${sec.text}</p>
        `).join('');

        app.innerHTML = `
            <h1>${data.title}</h1>
            <p class="tagline">出典: フリー百科事典『Juxlyep』</p>
            ${infoboxHtml}
            <div class="content-body">
                <p><b>${data.title}</b>は、${data.summary}</p>
                ${sectionsHtml}
            </div>
        `;
    }

    // 初期描画
    renderPage(pageData);
</script>

</body>
</html>
