<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Juxlyep - 自由な百科事典</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --link: #0645ad; --border: #a2a9b1; --bg: #f6f6f6; }
        body { margin: 0; font-family: sans-serif; font-size: 14px; background: var(--bg); display: flex; }
        nav { width: 160px; padding: 15px; flex-shrink: 0; }
        .logo { font-family: serif; font-size: 26px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        nav ul { list-style: none; padding: 0; border-top: 1px solid var(--border); }
        nav li { padding: 5px 0; border-bottom: 1px solid #e8e8e8; }
        nav a { text-decoration: none; color: var(--link); font-size: 12px; }
        
        .main-wrapper { flex-grow: 1; background: white; border-left: 1px solid var(--border); min-height: 100vh; padding: 20px 40px; }
        .content-section { display: none; } /* 基本は非表示 */
        .content-section:target, .active { display: block; } /* ターゲットまたはactiveクラスで表示 */
        
        h1 { font-family: serif; font-size: 1.8rem; border-bottom: 1px solid var(--border); font-weight: normal; margin-top: 0; }
        .infobox { float: right; width: 260px; border: 1px solid var(--border); background: #f8f9fa; margin-left: 20px; font-size: 12px; }
        .infobox th { background: #cedff2; border: 1px solid var(--border); padding: 5px; text-align: left; }
        .infobox td { border: 1px solid var(--border); padding: 5px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Juxlyep</div>
    <ul>
        <li><a href="#メインページ">メインページ</a></li>
        <li><a href="#コミュニティ">コミュニティ</a></li>
        <li><a href="#ヘルプ">ヘルプ</a></li>
    </ul>
</nav>

<div class="main-wrapper">
    <!-- メインページ -->
    <div id="メインページ" class="content-section active">
        <h1>メインページ</h1>
        <div class="infobox"><table><tr><th>状態</th><td>オンライン</td></tr></table></div>
        <p><b>Juxlyep</b>へようこそ。</p>
    </div>

    <!-- コミュニティ -->
    <div id="コミュニティ" class="content-section">
        <h1>コミュニティ</h1>
        <p>議論や交流の場です。</p>
    </div>

    <!-- ヘルプ -->
    <div id="ヘルプ" class="content-section">
        <h1>ヘルプ</h1>
        <p>使い方のガイドです。</p>
    </div>

    <!-- DBから取得した動的記事用の枠 -->
    <div id="dynamic-content" class="content-section">
        <h1 id="dyn-title"></h1>
        <div id="dyn-body"></div>
    </div>
</div>

<script>
    const S_URL = 'https://fuubwstlnpdxsjywxcqx.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1dWJ3c3RsbmRwZHhzanl3eGNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzEwMzEsImV4cCI6MjA5NDMwNzAzMX0.47ck77pxTUzU4jvkMF8wiaxw-CRSRGEsB0ZC1w18dzs';
    const sbClient = window.supabase.createClient(S_URL, S_KEY);

    async function router() {
        const hash = decodeURIComponent(location.hash.replace('#', '')) || 'メインページ';
        
        // 全セクションを一旦非表示
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        
        const targetEl = document.getElementById(hash);
        
        if (targetEl) {
            // HTML内にIDが存在する場合（固定ページ）
            targetEl.classList.add('active');
        } else {
            // HTMLにない場合、Supabaseから記事を探す
            const dynSection = document.getElementById('dynamic-content');
            dynSection.classList.add('active');
            document.getElementById('dyn-title').textContent = hash;
            document.getElementById('dyn-body').innerHTML = '読み込み中...';

            const { data, error } = await sbClient.from('articles').select('*').eq('title', hash).single();

            if (data) {
                document.getElementById('dyn-body').innerHTML = `<p>${data.summary}</p>`; // 簡易表示
            } else {
                document.getElementById('dyn-body').innerHTML = `<p>記事がありません。</p>`;
            }
        }
    }

    window.addEventListener('hashchange', router);
    router();
</script>
</body>
</html>
