<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Server Promotion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* クライアントに合わせてここを変えるだけで色変え完了 */
            --main-color: #5865F2; 
            --accent-color: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #23272a;
            color: white;
        }

        /* 背景：ここにサーバーのメインビジュアルを入れる */
        .bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://source.unsplash.com/random/1600x900/?dark,abstract') no-repeat center center/cover;
            filter: blur(8px);
            z-index: -1;
            transform: scale(1.1);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        /* サーバーヘッドライン */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .server-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .server-desc {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* ウィジェットエリア */
        .widget-area {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #2f3136; /* ウィジェット読み込み前のダミー色 */
            min-height: 400px; /* ウィジェットの高さに合わせる */
        }

        /* ボタン装飾 */
        .join-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 15px 40px;
            background: var(--main-color);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .join-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4);
            filter: brightness(1.2);
        }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="bg-image"></div>
<div class="overlay"></div>

<div class="main-content">
    <div class="glass-card">
        <div class="server-title">SERVER NAME</div>
        <div class="server-desc">ここにサーバーの紹介文やタグラインを短く入れる</div>

        <!-- Widget Area: クライアントのウィジェットコードをここに貼る -->
        <div class="widget-area">
            <!-- 例: <iframe src="https://discord.com/widget?id=..." width="100%" height="400" ...></iframe> -->
            <p style="padding-top:180px; color:#666;">[ Discord Widget Area ]</p>
        </div>

        <a href="#" class="join-btn">Open Discord</a>
    </div>

    <footer>
        DESIGNED FOR THE COMMUNITY
    </footer>
</div>

</body>
</html>
