<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Juxlyep - 自由な百科事典</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --link: #0645ad; --border: #a2a9b1; --bg: #f6f6f6; }
        body { margin: 0; font-family: sans-serif; font-size: 14px; background: var(--bg); display: flex; }
        nav { width: 160px; padding: 15px; flex-shrink: 0; }
        .logo { font-family: serif; font-size: 26px; font-weight: bold; margin-bottom: 20px; text-align: center; cursor: pointer; }
        nav ul { list-style: none; padding: 0; border-top: 1px solid var(--border); }
        nav li { padding: 5px 0; border-bottom: 1px solid #e8e8e8; }
        nav a { text-decoration: none; color: var(--link); font-size: 12px; }
        .main-wrapper { flex-grow: 1; background: white; border-left: 1px solid var(--border); min-height: 100vh; padding: 20px 40px; }
        h1 { font-family: 'Times New Roman', serif; font-size: 1.8rem; border-bottom: 1px solid var(--border); font-weight: normal; margin-top: 0; }
        .tagline { font-size: 12px; margin-bottom: 20px; color: #555; }
        .infobox { float: right; width: 260px; border: 1px solid var(--border); background: #f8f9fa; margin-left: 20px; font-size: 12px; }
        .infobox table { width: 100%; border-collapse: collapse; }
        .infobox th { background: #cedff2; border: 1px solid var(--border); padding: 5px; text-align: left; width: 30%; }
        .infobox td { border: 1px solid var(--border); padding: 5px; }
        h2 { border-bottom: 1px solid var(--border); font-size: 1.5rem; font-weight: normal; margin-top: 30px; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.hash='#メインページ'">Juxlyep</div>
    <ul>
        <li><a href="#メインページ">メインページ</a></li>
        <li><a href="#コミュニティ">コミュニティ</a></li>
        <li><a href="#ヘルプ">ヘルプ</a></li>
    </ul>
</nav>

<div class="main-wrapper">
    <h1 id="page-title">メインページ</h1>
    <p class="tagline">出典: フリー百科事典『Juxlyep』</p>
    <div id="page-body">
        <!-- 初期状態のHTML（DBから取得できるまでの表示） -->
        <div class="infobox">
            <table>
                <tr><th colspan="2" style="text-align:center; background:#aaa; color:white;">Juxlyep 統計</th></tr>
                <tr><th>状態</th><td>オンライン</td></tr>
                <tr><th>設立</th><td>2026年</td></tr>
            </table>
        </div>
        <p><b>Juxlyep</b>へようこそ。ここは、誰でも編集できる（予定の）自由な百科事典です。</p>
        <h2>お知らせ</h2>
        <p>現在、Supabaseとの同期テストを実施しています。左のメニューから各ページへ飛べるようになります。</p>
    </div>
</div>

<script>
    const S_URL = 'https://fuubwstlnpdxsjywxcqx.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1dWJ3c3RsbmRwZHhzanl3eGNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzEwMzEsImV4cCI6MjA5NDMwNzAzMX0.47ck77pxTUzU4jvkMF8wiaxw-CRSRGEsB0ZC1w18dzs';
    
    const sbClient = window.supabase.createClient(S_URL, S_KEY);

    async function loadArticle() {
        const title = decodeURIComponent(location.hash.replace('#', '')) || 'メインページ';
        const titleEl = document.getElementById('page-title');
        const bodyEl = document.getElementById('page-body');

        titleEl.textContent = title;

        // DBにデータを取りに行く
        const { data, error } = await sbClient
            .from('articles')
            .select('*')
            .eq('title', title)
            .single();

        // 取得成功した時だけ中身を書き換える。
        // データがない、またはエラーの時はHTMLに直書きした内容（または404）を維持
        if (!error && data) {
            let infoHtml = '';
            if (data.infobox_data) {
                infoHtml = `<div class="infobox"><table>${Object.entries(data.infobox_data).map(([k, v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('')}</table></div>`;
            }
            let sectionsHtml = (data.sections || []).map(s => `<h2>${s.heading}</h2><p>${s.content}</p>`).join('');
            bodyEl.innerHTML = `${infoHtml}<p><b>${data.title}</b>は、${data.summary}</p>${sectionsHtml}`;
        } else if (title !== 'メインページ') {
            bodyEl.innerHTML = `<p>記事「${title}」はまだ執筆されていません。</p>`;
        }
    }

    window.addEventListener('hashchange', loadArticle);
    loadArticle(); // 初回実行
</script>

</body>
</html>
