<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Juxlyep</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --link: #0645ad; --border: #a2a9b1; --bg: #f6f6f6; }
        body { margin: 0; font-family: sans-serif; font-size: 14px; background: var(--bg); display: flex; }
        nav { width: 160px; padding: 15px; flex-shrink: 0; }
        .logo { font-family: serif; font-size: 26px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        nav ul { list-style: none; padding: 0; border-top: 1px solid var(--border); }
        nav a { text-decoration: none; color: var(--link); font-size: 12px; display: block; padding: 5px 0; cursor: pointer; }
        .main-wrapper { flex-grow: 1; background: white; border-left: 1px solid var(--border); min-height: 100vh; padding: 20px 40px; position: relative; }
        h1 { font-family: serif; font-size: 1.8rem; border-bottom: 1px solid var(--border); font-weight: normal; margin-top: 0; }
        .edit-btn { position: absolute; top: 20px; right: 40px; background: #eee; border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; border-radius: 2px; }
        .edit-btn:hover { background: #ddd; }
        textarea { width: 100%; height: 300px; margin-top: 10px; font-family: monospace; border: 1px solid var(--border); padding: 10px; }
        .save-btn { background: #36c; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; border-radius: 2px; }
        #display-area, #edit-area { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Juxlyep</div>
    <ul>
        <li><a onclick="location.hash='#メインページ'">メインページ</a></li>
        <li><a onclick="const p=prompt('記事名を入力'); if(p) location.hash='#'+p">新規記事作成</a></li>
    </ul>
</nav>

<div class="main-wrapper">
    <button class="edit-btn" id="edit-toggle">編集</button>

    <!-- 表示モード -->
    <div id="display-area" class="active">
        <h1 id="page-title">メインページ</h1>
        <div id="page-body"></div>
    </div>

    <!-- 編集モード -->
    <div id="edit-area">
        <h1 id="edit-title">記事の編集</h1>
        <textarea id="editor" placeholder="記事の内容を入力してください..."></textarea>
        <button class="save-btn" onclick="saveData()">保存する</button>
        <button onclick="toggleMode(false)">キャンセル</button>
    </div>
</div>

<script>
    const S_URL = 'https://fuubwstlnpdxsjywxcqx.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1dWJ3c3RsbmRwZHhzanl3eGNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzEwMzEsImV4cCI6MjA5NDMwNzAzMX0.47ck77pxTUzU4jvkMF8wiaxw-CRSRGEsB0ZC1w18dzs';
    const sb = window.supabase.createClient(S_URL, S_KEY);

    let currentTitle = "";

    async function load() {
        currentTitle = decodeURIComponent(location.hash.replace('#', '')) || 'メインページ';
        document.getElementById('page-title').textContent = currentTitle;
        toggleMode(false);

        const { data, error } = await sb.from('articles').select('*').eq('title', currentTitle).single();

        if (data) {
            document.getElementById('page-body').innerHTML = `<p>${data.summary}</p>`;
            document.getElementById('editor').value = data.summary;
        } else {
            document.getElementById('page-body').innerHTML = `<p>記事「${currentTitle}」は存在しません。「編集」ボタンから作成してください。</p>`;
            document.getElementById('editor').value = "";
        }
    }

    async function saveData() {
        const content = document.getElementById('editor').value;
        const { error } = await sb.from('articles').upsert(
            { title: currentTitle, summary: content },
            { onConflict: 'title' }
        );

        if (error) {
            alert('保存に失敗しました。RLS（アクセス権限）の設定を確認してください。\n' + error.message);
        } else {
            alert('保存しました！');
            load();
        }
    }

    function toggleMode(isEdit) {
        document.getElementById('display-area').classList.toggle('active', !isEdit);
        document.getElementById('edit-area').classList.toggle('active', isEdit);
    }

    document.getElementById('edit-toggle').onclick = () => toggleMode(true);
    window.onhashchange = load;
    load();
</script>
</body>
</html>
